<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Dhruv Pradeep</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{background:#000;color:#fff;font-family:'Archivo',sans-serif;line-height:1.7}
        ::selection{background:#fff;color:#000}

        .top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2.5rem;background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent)}
        .back{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;transition:color .3s}
        .back:hover{color:#fff}
        .top-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}

        .wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;max-width:640px;margin:0 auto;padding:6rem 2rem;text-align:center}

        h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:900;letter-spacing:-1.5px;text-transform:uppercase;line-height:1.05;margin-bottom:.8rem}
        .sub{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3.5rem}

        .label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:1.2rem}

        /* Emails */
        .emails{display:flex;flex-direction:column;gap:.8rem;width:100%;max-width:440px;margin-bottom:3rem}
        .email{display:grid;grid-template-columns:1fr auto;align-items:center;gap:1rem;padding:1rem 1.4rem;border:1px solid rgba(255,255,255,.1);border-radius:14px;text-decoration:none;transition:all .3s;text-align:left}
        .email:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.03)}
        .email .tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);white-space:nowrap}
        .email .addr{font-size:.95rem;color:#fff;font-weight:500}

        /* Socials */
        .socials{display:flex;gap:1.1rem;margin-bottom:3rem}
        .socials a{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid rgba(255,255,255,.15);border-radius:50%;transition:all .3s}
        .socials a:hover{border-color:#fff;background:#fff}
        .socials a svg{width:18px;height:18px;fill:rgba(255,255,255,.7);transition:fill .3s}
        .socials a:hover svg{fill:#000}

        /* Cal */
        .cal-btn{display:inline-flex;align-items:center;gap:.8rem;padding:1.1rem 2.4rem;background:#fff;color:#000;font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:100px;transition:all .3s}
        .cal-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,255,255,.15)}
        .cal-btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2}
        .cal-note{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:1rem;text-transform:uppercase}

        /* Calendar */
        .cal-widget{width:280px;padding:1.4rem;border:1px solid rgba(255,255,255,.1);border-radius:16px;margin-bottom:2rem}
        .cal-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
        .cal-month{font-weight:800;font-size:1.05rem;letter-spacing:-.3px}
        .cal-year{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.35);letter-spacing:2px}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.15rem;font-family:'JetBrains Mono',monospace}
        .cal-grid .dow{font-size:.55rem;letter-spacing:1px;color:rgba(255,255,255,.25);text-transform:uppercase;padding:.3rem 0;text-align:center}
        .cal-grid .day{font-size:.72rem;color:rgba(255,255,255,.55);text-align:center;padding:.34rem 0;border-radius:8px}
        .cal-grid .day.today{background:#fff;color:#000;font-weight:700}
        .cal-grid .day.empty{visibility:hidden}

        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .r{opacity:0;animation:fadeUp .9s ease forwards}
        .r1{animation-delay:.15s}.r2{animation-delay:.3s}.r3{animation-delay:.45s}.r4{animation-delay:.6s}

        @media(max-width:600px){.top{padding:1.2rem 1.5rem}}
    </style>
</head>
<body>
    <div class="top">
        <a class="back" href="/">&larr; Home</a>
        <span class="top-label">Contact</span>
    </div>

    <div class="wrap">
        <h1 class="r r1">Reach out.</h1>
        <div class="sub r r1">Feel free — always down to talk</div>

        <div class="r r2" style="width:100%;display:flex;flex-direction:column;align-items:center">
            <div class="label">Mail</div>
            <div class="emails">
                <a class="email" href="mailto:dhruvcp07@gmail.com">
                    <span class="addr">dhruvcp07@gmail.com</span>
                    <span class="tag">Personal</span>
                </a>
                <a class="email" href="mailto:dhruv@cnvrted.com">
                    <span class="addr">dhruv@cnvrted.com</span>
                    <span class="tag">Cnvrted</span>
                </a>
                <a class="email" href="mailto:dhruv.pradeep@morphic.com">
                    <span class="addr">dhruv.pradeep@morphic.com</span>
                    <span class="tag">Morphic</span>
                </a>
            </div>
        </div>

        <div class="r r3" style="display:flex;flex-direction:column;align-items:center">
            <div class="label">Socials</div>
            <div class="socials">
                <a href="https://www.linkedin.com/in/dhruvpradeep/" target="_blank" aria-label="LinkedIn"><svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 110-4.12 2.06 2.06 0 010 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg></a>
                <a href="https://x.com/TheDhruvPradeep" target="_blank" aria-label="X"><svg viewBox="0 0 24 24"><path d="M18.24 2.25h3.31l-7.23 8.26 8.5 11.24h-6.66l-5.21-6.82L5 21.75H1.68l7.73-8.84L1.25 2.25h6.83l4.71 6.23 5.45-6.23zm-1.16 17.52h1.83L7.08 4.13H5.12l11.96 15.64z"/></svg></a>
                <a href="https://www.instagram.com/_dhruvpradeep/" target="_blank" aria-label="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 3.25.15 4.77 1.69 4.92 4.92.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.15 3.23-1.66 4.77-4.92 4.92-1.27.06-1.64.07-4.85.07s-3.58-.01-4.85-.07c-3.26-.15-4.77-1.7-4.92-4.92-.06-1.27-.07-1.64-.07-4.85s.01-3.58.07-4.85C2.38 3.92 3.9 2.38 7.15 2.23 8.42 2.17 8.8 2.16 12 2.16zm0 3.68a6.16 6.16 0 100 12.32 6.16 6.16 0 000-12.32zm0 10.16a4 4 0 110-8 4 4 0 010 8zm6.4-11.85a1.44 1.44 0 100 2.88 1.44 1.44 0 000-2.88z"/></svg></a>
            </div>
        </div>

        <div class="r r4" style="display:flex;flex-direction:column;align-items:center">
            <div class="cal-widget">
                <div class="cal-head">
                    <span class="cal-month" id="calMonth"></span>
                    <span class="cal-year" id="calYear"></span>
                </div>
                <div class="cal-grid" id="calGrid"></div>
            </div>
            <a class="cal-btn" href="https://cal.com/dhruv-pradeep-ykosw1" target="_blank">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Book a call
            </a>
            <div class="cal-note">No agenda needed — let's just talk</div>
        </div>
    </div>
    <script>
        const now = new Date();
        const Y = now.getFullYear(), M = now.getMonth(), D = now.getDate();
        document.getElementById('calMonth').textContent = now.toLocaleString('en',{month:'long'});
        document.getElementById('calYear').textContent = Y;
        const grid = document.getElementById('calGrid');
        ['SU','MO','TU','WE','TH','FR','SA'].forEach(d => {
            const el = document.createElement('div'); el.className='dow'; el.textContent=d; grid.appendChild(el);
        });
        const first = new Date(Y, M, 1).getDay();
        const days = new Date(Y, M+1, 0).getDate();
        for(let i=0;i<first;i++){ const el=document.createElement('div'); el.className='day empty'; grid.appendChild(el); }
        for(let d=1;d<=days;d++){
            const el=document.createElement('div');
            el.className = 'day' + (d===D ? ' today' : '');
            el.textContent = d;
            grid.appendChild(el);
        }
    </script>
</body>
</html>
