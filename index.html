        .corner-tl span{color:rgba(255,255,255,.35)}
        .corner-tr{top:2rem;right:2.5rem;display:flex;align-items:center;gap:.7rem}
        .corner-tr .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
        .corner-bl{bottom:2.35rem;left:2.5rem;line-height:1.9}
        .corner-bl .label{color:rgba(255,255,255,.3);font-size:.6rem}
        .corner-bl .val{color:rgba(255,255,255,.75)}
        .corner-br{bottom:2.55rem;right:2.5rem;display:flex;gap:1.1rem;align-items:center}
        .corner-br a{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid rgba(255,255,255,.15);border-radius:50%;transition:all .3s}
        .corner-br a:hover{border-color:#fff;background:#fff}
        .corner-br a svg{width:15px;height:15px;fill:rgba(255,255,255,.7);transition:fill .3s}
        .corner-br a:hover svg{fill:#000}

        /* Center */
        .content{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
        .name{font-size:clamp(2.6rem,7.5vw,6.5rem);font-weight:900;letter-spacing:-2px;text-transform:uppercase;line-height:1;white-space:nowrap;margin-bottom:1.2rem}
        .tag{font-family:'JetBrains Mono',monospace;font-size:clamp(.7rem,1.3vw,.95rem);letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:300}
        .tag{position:relative}
        .tag .cursor{position:absolute;width:8px;height:1em;background:rgba(255,255,255,.6);margin-left:6px;animation:blink 1.1s steps(1) infinite}

        /* Nav links */
        .links{position:fixed;bottom:2.9rem;left:50%;transform:translateX(-50%);z-index:3;display:flex;align-items:center}
        .links a{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;padding:.5rem 2rem;position:relative;transition:color .3s}
        .links a:hover{color:#fff}
        .links a::after{content:'';position:absolute;bottom:.4rem;left:50%;transform:translateX(-50%) scaleX(0);width:calc(100% - 4rem);height:1px;background:#fff;transition:transform .3s}
        .links a:hover::after{transform:translateX(-50%) scaleX(1)}
        .links a+a::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:1px;height:12px;background:rgba(255,255,255,.15)}

        @keyframes blink{50%{opacity:0}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .anim-1{animation:fadeUp 1s ease forwards .3s;opacity:0}
        .anim-2{animation:fadeUp 1s ease forwards .7s;opacity:0}
        .anim-3{animation:fadeIn 1.2s ease forwards 1.2s;opacity:0}

        @media(max-width:700px){
            .corner-tl{top:1.2rem;left:1.2rem}
            .corner-tr{top:1.2rem;right:1.2rem}
            .corner-bl{display:none}
            .corner-br{bottom:5.5rem;right:50%;transform:translateX(50%)}
            .links{bottom:1.2rem;width:100%;justify-content:center}
            .links a{padding:.8rem 1rem}
            .name{letter-spacing:-1px}
            .tag{letter-spacing:3px}
        }
    </style>
</head>

    <canvas id="physics" style="position:fixed;inset:0;z-index:1;pointer-events:none"></canvas>
    <script>
        function tick(){
            const t = new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:false});
            document.getElementById('clock').textContent = 'BLR ' + t + ' IST';
        }
        tick(); setInterval(tick, 30000);

        // Particle network with mouse-repulsion physics
        const cv = document.getElementById('physics');
        const cx = cv.getContext('2d');
        let W, H;
        const mouse = {x: -9999, y: -9999};
        const N = 70, LINK = 130, REPEL = 120;
        const particles = [];

        function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
        resize();
        addEventListener('resize', resize);
        addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

        for(let i = 0; i < N; i++){
            particles.push({
                x: Math.random()*innerWidth, y: Math.random()*innerHeight,
                vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
                r: Math.random()*1.6 + .6
            });
        }

        function step(){
            cx.clearRect(0,0,W,H);
            for(const p of particles){
                const dx = p.x - mouse.x, dy = p.y - mouse.y;
                const d = Math.hypot(dx,dy);
                if(d < REPEL && d > 0){
                    const f = (REPEL - d)/REPEL * .5;
                    p.vx += dx/d*f; p.vy += dy/d*f;
                }
                p.vx *= .96; p.vy *= .96;
                p.vx += (Math.random()-.5)*.02; p.vy += (Math.random()-.5)*.02;
                p.x += p.vx; p.y += p.vy;
                if(p.x < -20) p.x = W+20; if(p.x > W+20) p.x = -20;
                if(p.y < -20) p.y = H+20; if(p.y > H+20) p.y = -20;
                cx.beginPath();
                cx.arc(p.x, p.y, p.r, 0, 7);
                cx.fillStyle = 'rgba(255,255,255,.5)';
                cx.fill();
            }
            for(let i = 0; i < N; i++){
                for(let j = i+1; j < N; j++){
                    const a = particles[i], b = particles[j];
                    const d = Math.hypot(a.x-b.x, a.y-b.y);
                    if(d < LINK){
                        cx.beginPath();
                        cx.moveTo(a.x, a.y); cx.lineTo(b.x, b.y);
                        cx.strokeStyle = 'rgba(255,255,255,' + (.13*(1-d/LINK)).toFixed(3) + ')';
                        cx.lineWidth = .6;
                        cx.stroke();
                    }
                }
            }
            requestAnimationFrame(step);
        }
        step();
    </script>
