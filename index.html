    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{background:#000;color:#fff;font-family:'Archivo',sans-serif;overflow:hidden}
        ::selection{background:#fff;color:#000}


        .mono{font-family:'JetBrains Mono',monospace}

        /* Corners */
        .corner{position:fixed;z-index:3;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45)}
        .corner-tl{top:2rem;left:2.5rem;font-weight:700;font-size:1rem;letter-spacing:1px;color:#fff}
        .corner-tl span{color:rgba(255,255,255,.35)}
        .corner-tr{top:2rem;right:2.5rem;display:flex;align-items:center;gap:.7rem}
        .corner-tr .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
        /* Now playing (Spotify) */
        .corner-np{top:4.9rem;right:2.5rem;display:none;align-items:center;gap:.7rem;text-decoration:none;padding:.5rem .7rem .5rem .55rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;backdrop-filter:blur(8px);transition:all .3s}
        .corner-np:hover{transform:translateY(-1px);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14)}
        .np-art{width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.55);background:#1a1a1a}
        .np-art img{width:100%;height:100%;object-fit:cover;display:block}
        .np-info{min-width:0;text-align:right}
        .np-label{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:flex-end;gap:.4rem;margin-bottom:.22rem}
        .np-eq{display:inline-flex;align-items:flex-end;gap:1.5px;height:8px}
        .np-eq i{width:2px;background:#1DB954;transform-origin:bottom;animation:eq .9s ease-in-out infinite}
        .np-eq i:nth-child(1){height:40%;animation-delay:0s}
        .np-eq i:nth-child(2){height:100%;animation-delay:.25s}
        .np-eq i:nth-child(3){height:65%;animation-delay:.5s}
        @keyframes eq{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
        .np-paused .np-eq i{animation-play-state:paused;background:rgba(255,255,255,.4);transform:scaleY(.5)}
        .np-title{font-size:.76rem;font-weight:600;color:rgba(255,255,255,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;transition:color .3s}
        .corner-np:hover .np-title{color:#1DB954}
        .np-artist{font-size:.64rem;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;margin-top:.1rem}
        .corner-tl2{top:2rem;left:2.5rem;line-height:1.9;max-width:300px}
        .corner-tl2 .label{color:rgba(255,255,255,.3);font-size:.6rem;display:flex;align-items:center;gap:.45rem}
        .corner-tl2 .label .new-dot{width:6px;height:6px;background:#facc15;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 6px rgba(250,204,21,.8)}
        .corner-tl2 a{color:rgba(255,255,255,.75);text-decoration:none;border:none;transition:color .3s;display:block}
        .corner-tl2 a:hover{color:#fff}
        .corner-bl{bottom:4.4rem;left:2.5rem;line-height:1.9}
        .corner-bl .label{color:rgba(255,255,255,.3);font-size:.6rem;display:flex;align-items:center;gap:.45rem}
        .corner-bl .label .live-dot{width:6px;height:6px;background:#3b82f6;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 6px rgba(59,130,246,.8)}
        .corner-bl .val{color:rgba(255,255,255,.75)}
        .corner-br{bottom:4.9rem;right:2.5rem;display:flex;gap:1.1rem;align-items:center}
        .corner-br a{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;transition:all .3s;border:none}
        .corner-br a:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.5)}
        .corner-br a svg{width:16px;height:16px}
        .s-li{background:#0A66C2}
        .s-li svg{fill:#fff}
        .s-x{background:#fff}
        .s-x svg{fill:#000}
        .s-ig{background:radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%)}
        .s-ig svg{fill:#fff}

        /* Center */
        .content{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transform:translateY(-7vh)}
        .name{font-size:clamp(2.6rem,7.5vw,6.5rem);font-weight:900;letter-spacing:-2px;text-transform:uppercase;line-height:1;white-space:nowrap;margin-bottom:1.2rem}
        .tag{font-family:'JetBrains Mono',monospace;font-size:clamp(.8rem,1.5vw,1.1rem);letter-spacing:7px;text-transform:uppercase;color:rgba(255,255,255,.72);font-weight:700;text-shadow:0 0 24px rgba(255,255,255,.25)}
        .tag{position:relative;min-height:1.4em}
        .tag .cursor{position:absolute;width:8px;height:1em;background:rgba(255,255,255,.6);margin-left:6px;animation:blink 1.1s steps(1) infinite}

        /* Timeline ruler */
        .footer-stack{position:fixed;bottom:4.6rem;left:0;right:0;z-index:3;display:flex;flex-direction:column;gap:1.2rem;align-items:center;pointer-events:none}
        .footer-stack .links a{pointer-events:auto}
        .ruler{position:relative;width:100%;height:30px;pointer-events:none;font-family:'JetBrains Mono',monospace}
        .ruler .tick{position:absolute;bottom:0;width:1px;background:rgba(255,255,255,.18)}
        .ruler .tick.major{height:9px;background:rgba(255,255,255,.32)}
        .ruler .tick.minor{height:5px}
        .ruler .tick-label{position:absolute;bottom:14px;transform:translateX(-50%);font-size:.58rem;color:rgba(255,255,255,.35);letter-spacing:.5px}

        /* Nav links */
        .links{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;padding:0 1rem;max-width:calc(100vw - 560px)}
        .links a{font-family:'Archivo',sans-serif;font-size:.95rem;font-weight:500;color:rgba(255,255,255,.9);text-decoration:none;text-align:left;padding:.65rem 2.8rem .65rem 1.1rem;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:#1c1c1e;transition:all .25s}
        .links a:hover{background:#2c2c2e;border-color:rgba(255,255,255,.35);transform:translateY(-2px)}

        @keyframes blink{50%{opacity:0}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .anim-1{animation:fadeUp 1s ease forwards .3s;opacity:0}
        .anim-2{animation:fadeUp 1s ease forwards .7s;opacity:0}
        .anim-3{animation:fadeIn 1.2s ease forwards 1.2s;opacity:0}

        /* Tablet + mobile: stacked centered layout, no corner collisions */
        @media(max-width:1200px){
            .corner-bl{display:none}
            .corner-tl2{display:none}
            .corner-np{display:none !important}
            .content{transform:translateY(-10vh)}
            .name{font-size:clamp(1.9rem,8vw,5rem);letter-spacing:-1.5px}
            .corner-br{bottom:12.5rem;right:50%;transform:translateX(50%)}
            .corner-br a{width:40px;height:40px}
            .footer-stack{bottom:1.1rem;gap:1rem}
            .links{max-width:100%;justify-content:center;flex-wrap:wrap;gap:.5rem;padding:0 1rem}
        }
        @media(max-width:700px){
            .corner-tl{top:1.2rem;left:1.2rem}
            .corner-tr{top:1.2rem;right:1.2rem}
            .name{letter-spacing:-1px}
            .tag{font-size:.72rem;letter-spacing:4px}
            .corner-br a{width:38px;height:38px}
            .links a{padding:.5rem 1.4rem .5rem .9rem;font-size:.82rem}
        }

    <canvas id="physics" style="position:fixed;inset:0;z-index:1;pointer-events:none"></canvas>
    <script>
        // timeline ruler
        function buildRuler(){
            const ruler = document.getElementById('ruler');
            ruler.innerHTML = '';
            const W = innerWidth, SEC = 130, SUB = 5;
            const secs = Math.ceil(W / SEC);
            for(let s = 0; s <= secs; s++){
                const x = s * SEC;
                const t = document.createElement('div');
                t.className = 'tick major';
                t.style.left = x + 'px';
                ruler.appendChild(t);
                const lbl = document.createElement('span');
                lbl.className = 'tick-label';
                lbl.style.left = x + 'px';
                lbl.textContent = s === 0 ? '0' : s + 's';
                ruler.appendChild(lbl);
                for(let m = 1; m < SUB; m++){
                    const mt = document.createElement('div');
                    mt.className = 'tick minor';
                    mt.style.left = (x + m * SEC / SUB) + 'px';
                    ruler.appendChild(mt);
                }
            }
        }
        buildRuler();
        addEventListener('resize', buildRuler);

        function tick(){
            const t = new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:false});
            document.getElementById('clock').textContent = 'BLR ' + t + ' IST';
        }
        tick(); setInterval(tick, 30000);

        // now playing (Spotify)
        async function updateNP(){
            try{
                const r = await fetch('/api/now-playing');
                if(!r.ok) return;
                const d = await r.json();
                const el = document.getElementById('np');
                if(!d || !d.title){ el.style.display='none'; return; }
                document.getElementById('npArt').src = d.albumArt || '';
                document.getElementById('npTitle').textContent = d.title;
                document.getElementById('npArtist').textContent = d.artist;
                document.getElementById('npState').textContent = d.isPlaying ? "Dhruv's listening to" : "Dhruv last played";
                el.href = d.url || '#';
                el.classList.toggle('np-paused', !d.isPlaying);
                el.style.display = 'flex';
            }catch(e){}
        }
        updateNP();
        setInterval(updateNP, 30000);


        // Starfield warp — drifting through space, cursor steers the view
        const cv = document.getElementById('physics');
        const cx = cv.getContext('2d');
        let W, H, CXc, CYc;
        const mouse = {x: null, y: null};
        const N = 260;
        const stars = [];

        function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; CXc = W/2; CYc = H/2; }
        resize();
        addEventListener('resize', resize);
        addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

        function spawn(s){
            s.x = (Math.random()-.5) * W * 1.6;
            s.y = (Math.random()-.5) * H * 1.6;
            s.z = 400 + Math.random()*1200;
        }
        for(const _ of Array(N)){ const s={}; spawn(s); s.z = Math.random()*1600 + 100; stars.push(s); }

        const SPEED = 2.2;
        function step(){
            cx.clearRect(0,0,W,H);
            const tx = mouse.x !== null ? (mouse.x - CXc) * .25 : 0;
            const ty = mouse.y !== null ? (mouse.y - CYc) * .25 : 0;

            for(const s of stars){
                const pz = s.z;
                s.z -= SPEED * (1 + (mouse.x !== null ? .8 : 0));
                if(s.z < 60){ spawn(s); continue; }

                const f  = 320 / s.z,  pf = 320 / pz;
                const x  = CXc + tx*(1-f)  + s.x * f;
                const y  = CYc + ty*(1-f)  + s.y * f;
                const px = CXc + tx*(1-pf) + s.x * pf;
                const py = CYc + ty*(1-pf) + s.y * pf;

                if(x<-50||x>W+50||y<-50||y>H+50){ spawn(s); continue; }

                const near = 1 - s.z/1700;
                cx.beginPath();
                cx.moveTo(px, py);
                cx.lineTo(x, y);
                cx.strokeStyle = 'rgba(255,255,255,' + (near*.75).toFixed(3) + ')';
                cx.lineWidth = near * 2.2;
                cx.lineCap = 'round';
                cx.stroke();
            }
            requestAnimationFrame(step);
        }
        step();

        // typewriter tagline
        const PHRASES = ['Founder In Progress', 'Building Cnvrted', 'Marketing @ Morphic', '19 · Bangalore'];
        const typedEl = document.getElementById('typed');
        let pi = 0;
        function typeLoop(){
            const phrase = PHRASES[pi];
            let i = phrase.length; // start full (first phrase already shown)
            function erase(){
                if(i > 0){ i--; typedEl.textContent = phrase.slice(0, i); setTimeout(erase, 32); }
                else { pi = (pi + 1) % PHRASES.length; typeNext(); }
            }
            function typeNext(){
                const next = PHRASES[pi];
                let j = 0;
                (function t(){
                    if(j <= next.length){ typedEl.textContent = next.slice(0, j); j++; setTimeout(t, 62); }
                    else setTimeout(() => typeLoop(), 2100);
                })();
            }
            setTimeout(erase, 2400);
        }
        setTimeout(typeLoop, 2600);
    </script>
