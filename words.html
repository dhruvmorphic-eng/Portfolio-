<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words by Dhruv Pradeep — Quotes & Thoughts on Building</title>
    <link rel="canonical" href="https://dhruvpradeep.in/words">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="Raw, unfiltered quotes and thoughts on building, discipline and the founder mindset by Dhruv Pradeep.">
    <meta property="og:title" content="Words by Dhruv Pradeep — Quotes & Thoughts on Building">
    <meta property="og:description" content="Raw, unfiltered quotes and thoughts on building, discipline and the founder mindset by Dhruv Pradeep.">
    <meta property="og:image" content="https://dhruvpradeep.in/og.png">
    <meta property="og:url" content="https://dhruvpradeep.in/words">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://dhruvpradeep.in/og.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Archivo',sans-serif}
        ::selection{background:#fff;color:#000}

        .top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2.5rem;background:linear-gradient(to bottom,rgba(0,0,0,.95),transparent)}
        .back{font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;transition:color .3s}
        .back:hover{color:#fff}
        .top-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}

        .wrap{max-width:1100px;margin:0 auto;padding:8rem 2rem 4rem}

        h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:900;letter-spacing:-1.5px;text-transform:uppercase;line-height:1.05;text-align:center;margin-bottom:.8rem}
        .sub{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4rem;text-align:center}

        /* Masonry collage */
        .collage{columns:3;column-gap:1rem}
        .collage img{width:100%;display:block;margin-bottom:1rem;border-radius:14px;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:transform .3s,border-color .3s;break-inside:avoid}
        .collage img:hover{transform:scale(1.02);border-color:rgba(255,255,255,.25)}

        /* Download buttons */
        .tile{position:relative;break-inside:avoid;margin-bottom:1rem}
        .tile img{width:100%;display:block;margin:0;border-radius:14px;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:transform .3s,border-color .3s}
        .tile:hover img{transform:scale(1.02);border-color:rgba(255,255,255,.25)}
        .dl{position:absolute;top:.7rem;right:.7rem;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.25);border-radius:50%;opacity:0;transition:all .25s;z-index:2}
        .tile:hover .dl{opacity:1}
        .dl:hover{background:#fff}
        .dl svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2}
        .dl:hover svg{stroke:#000}
        .lb-dl{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:.6rem;padding:.8rem 1.8rem;background:#fff;color:#000;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:100px}
        .lb-dl svg{width:14px;height:14px;stroke:#000;fill:none;stroke-width:2}

        /* Lightbox */
        .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out;padding:2rem}
        .lightbox.open{display:flex}
        .lightbox img{max-width:min(90vw,600px);max-height:88vh;border-radius:16px}

        .empty-note{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;padding:4rem 0}

        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .r{opacity:0;animation:fadeUp .9s ease forwards}
        .r1{animation-delay:.15s}.r2{animation-delay:.35s}

        @media(max-width:900px){.collage{columns:2}}
        @media(max-width:560px){.collage{columns:1}.top{padding:1.2rem 1.5rem}}
        /* Ghost wordmark */
        .ghost{position:fixed;bottom:-.28em;left:50%;transform:translateX(-50%);font-family:'Archivo',sans-serif;font-size:24vw;font-weight:900;letter-spacing:-.02em;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.07);white-space:nowrap;pointer-events:none;user-select:none;z-index:0}
        .site-foot{position:relative;z-index:2;display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;padding:3rem 1.5rem 2.5rem}
        .site-foot a{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);text-decoration:none;padding:.4rem .8rem;transition:color .3s;border:none;font-weight:400}
        .site-foot a:hover{color:#fff;background:none}
    </style>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://dhruvpradeep.in/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Words",
      "item": "https://dhruvpradeep.in/words"
    }
  ]
}
    </script>
</head>
<body>
    <div class="top">
        <a class="back" href="/">&larr; Home</a>
        <span class="top-label">Words</span>
    </div>

    <div class="wrap">
        <h1 class="r r1">Words.</h1>
        <div class="sub r r1">Things I write · Raw &amp; unfiltered</div>

        <div class="collage r r2" id="collage"></div>
        <div class="empty-note" id="emptyNote" style="display:none">Loading words…</div>
    </div>

    <div class="lightbox" id="lightbox" onclick="if(event.target===this||event.target.id==='lightboxImg')this.classList.remove('open')">
        <img id="lightboxImg" src="" alt="">
        <a class="lb-dl" id="lightboxDl" href="" download onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Download
        </a>
    </div>

    <script>
        // List of quote images — add filenames to words/ folder and this array
        const IMAGES = ['quote-28.jpg','quote-01.jpg','quote-02.jpg','quote-03.jpg','quote-04.jpg','quote-05.jpg','quote-06.jpg','quote-07.jpg','quote-08.jpg','quote-09.jpg','quote-10.jpg','quote-11.jpg','quote-12.jpg','quote-13.jpg','quote-14.jpg','quote-15.jpg','quote-16.jpg','quote-17.jpg','quote-18.jpg','quote-19.jpg','quote-20.jpg','quote-21.jpg','quote-22.jpg','quote-23.jpg','quote-24.jpg','quote-25.jpg','quote-26.jpg','quote-27.jpg'];

        const collage = document.getElementById('collage');
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightboxImg');

        if(IMAGES.length === 0){
            document.getElementById('emptyNote').style.display = 'block';
            document.getElementById('emptyNote').textContent = 'Coming soon.';
        }

        const lbDl = document.getElementById('lightboxDl');
        IMAGES.forEach(src => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const img = document.createElement('img');
            img.src = 'words/' + src;
            img.loading = 'lazy';
            img.alt = 'Quote by Dhruv Pradeep';
            img.onclick = () => { lbImg.src = img.src; lbDl.href = img.src; lbDl.setAttribute('download', src); lb.classList.add('open'); };
            const dl = document.createElement('a');
            dl.className = 'dl';
            dl.href = img.src;
            dl.setAttribute('download', src);
            dl.setAttribute('aria-label', 'Download image');
            dl.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
            tile.appendChild(img);
            tile.appendChild(dl);
            collage.appendChild(tile);
        });
    </script>
    <nav class="site-foot">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/now">Now</a>
        <a href="/work">Work</a>
        <a href="/words">Words</a>
        <a href="/blog">Blog</a>
        <a href="/manifesto">Manifesto</a>
        <a href="/contact">Contact</a>
    </nav>
    <div class="ghost">Dhruv</div>
</body>
</html>
